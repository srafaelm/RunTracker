services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: runtracker-app
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=RunTracker;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true
      - Jwt__Secret=RunTracker-Production-Secret-Key-Change-This-Min-32-Chars!!
      - Jwt__Issuer=RunTracker
      - Jwt__Audience=RunTracker
      - Strava__ClientId=205084
      - Strava__ClientSecret=b10c89f12a474625a3bf3c1383f8ff5a5fcfbb31
      - Strava__RedirectUri=http://localhost:5000/api/auth/strava/callback
      - Strava__WebhookVerifyToken=runtracker-verify
      - Frontend__Url=http://localhost:5000
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/webhooks/strava?hub.mode=health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: runtracker-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sqlserver-data:
